version: '3.9'

services:
  db:
    image: postgres:15
    container_name: trainingz-db
    environment:
      POSTGRES_DB: trainingz
      POSTGRES_USER: trainingz
      POSTGRES_PASSWORD: trainingz1234
    ports:
      - "5432:5432"
    volumes:
      - carwash_data:/var/lib/postgresql/data

volumes:
  carwash_data:
