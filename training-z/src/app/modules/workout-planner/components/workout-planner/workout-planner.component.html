<div class="flex w-full h-full align-items-center flex-column">
    <div class="w-full flex header lg:p-2 p-3 flex-column lg:flex-row gap-3">
        <div class="flex-1 align-items-center flex gap-3 lg:gap-2 ml-0 lg:ml-4">
            <div class="flex gap-2">
                <app-button [label]="responsive.lg() ? 'Save' : ''" icon="pi pi-save" color="secondary" (click)="save()" />
            </div>

            <div class="flex align-items-center gap-2 lg:pl-4 p-0">
                <h1 class="m-0 p-0 line-height-1 text-3xl w-max">Planche volume</h1>
                <i class="pi pi-pencil text-xl"></i>
            </div>
        </div>

        <div class="flex-2 flex justify-content-start lg:justify-content-center">
            <div class="flex gap-3 align-items-center justify-content-center lg:justify-content-center user-tile py-2 px-3 border-round-lg w-max" (click)="openStudentInfoDialog()">
                <p-image [src]="defaultProfileImageUrl" width="45" imageClass="border-circle" />
                <h2 class="m-0 p-0 pb-1 line-height-1">Adrian Down</h2>
                <i class="pi pi-info-circle m-0 p-0 text-xl mb-1"></i>
            </div>
        </div>

        <div class="flex-1 hidden lg:flex"></div>
    </div>

    <div class="flex w-full justify-content-center overflow-auto">
        <div class="flex gap-2 m-0 px-2 pt-2 flex-column w-full lg:w-7">
            <div class="flex justify-content-end">
                <app-button label="Add training unit" icon="pi pi-plus" color="secondary" (click)="addTrainingUnit()" />
            </div>
            
            @for (unit of trainingPlan().trainingUnits; track $index) {
                <app-training-unit [trainingUnit]="unit" class="w-full" [deleteUnitSubject]="deleteUnitSubject" [unitIndex]="$index" />
            }
        </div>
    </div>
</div>
