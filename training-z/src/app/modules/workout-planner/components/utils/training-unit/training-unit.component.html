<p-accordion class="w-full">
    <p-accordion-panel value="0">
        <p-accordion-header class="text-2xl">{{ trainingUnit().name }}</p-accordion-header>
        <p-accordion-content>
            <div class="flex gap-2 flex-column">
                @for (section of trainingUnit().sections; track $index) {
                    <app-training-section [trainingSection]="section" />
                }
            </div>
        </p-accordion-content>
    </p-accordion-panel>
</p-accordion>
