<div class="flex flex-column w-full p-1 lg:p-3">
    <div class="flex align-items-center w-full">
        <p-image [src]="studentData()!.profileImageUrl!" [width]="responsive.lg() ? '120' : '80'" imageClass="border-circle" class="mr-4" />

        <h1 class="text-3xl lg:text-4xl m-0 p-0">{{ studentData()!.name! + ' ' + studentData()!.surname!}}</h1>
    </div>

    <p-divider class="m-0 my-4 w-full"/>
</div>
