@if (this.code != undefined) {
    <div class="flex justify-content-center w-full h-full overflow-auto">
        <div class="flex flex-column align-items-center m-0 p-0 container w-full lg:w-6">
            <div class="p-4 pb-0 flex align-items-center justify-content-center w-full flex-column gap-5 text-center">
                <h1 class="m-0 p-0 mt-2">Give your coach this invitation code</h1>

                <div class="flex align-items-center gap-3">
                    <h4 class="m-0 p-0 text-4xl">{{ code!() }}</h4>
                    <i class="pi pi-clipboard text-2xl" (click)="copyCode()"></i>
                </div>
            </div>

            <p-divider class="m-0 p-0 my-5" />

            <p-card class="w-full mb-5">
                <h2 class="text-xl m-0 p-0"><i class="pi pi-info-circle pr-2"></i>Info</h2>
                <p class="text-xl m-0 p-0 mt-2">Take some time to fill in the form below. It might really help your future coach</p>
            </p-card>

            <div class="flex flex-column gap-5 form-container pb-5 w-full" [formGroup]="form" >
                @for (key of questionKeys; track $index) {
                    <div class="flex flex-column gap-2">
                        <h5 class="m-0 p-0 text-xl pl-1">{{ questions[key] }}</h5>
                        <textarea [formControlName]="key" pTextarea variant="filled" [rows]="responsive.lg() ? 2 : responsive.md() ? 3 : 4" [cols]="responsive.lg() ? 60 : responsive.md() ? 45 : 25" ></textarea>
                    </div>
                }
            </div>

            <div class="flex justify-content-end w-full">
                <app-button label="Save" class="pb-5" [size]="responsive.lg() ? 'large' : undefined" (click)="saveUserInfo()" />
            </div>
        </div>
    </div>
}
