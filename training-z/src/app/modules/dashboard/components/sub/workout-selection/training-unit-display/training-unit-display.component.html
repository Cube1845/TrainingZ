<p-accordion class="w-full">
    <p-accordion-panel value="0">
        <p-accordion-header>
            <h1 class="m-0 p-0 text-2xl">{{ trainingUnit().name }}</h1>
        </p-accordion-header>
        <p-accordion-content>
            <div class="flex flex-column gap-2">
                @for (section of trainingUnit().trainingSections; track $index) {
                    <div class="p-4 darker-tile flex flex-column gap-2 border-round-lg">
                        <h2 class="m-0 p-0">{{ section.name }}</h2>

                        <div class="flex flex-column tile p-3 border-round-md">
                            @for (exercise of section.exercises; track $index) {
                                <h3 class="text-xl m-0 p-0">{{ exercise.name }}</h3>

                                <div class="flex">
                                    <h4 class="text-lg m-0 p-0 flex-1">Sets {{ exercise.sets }}</h4>
                                    <h4 class="text-lg m-0 p-0 flex-1">Reps {{ exercise.reps }}</h4>
                                </div>
                            }
                        </div>
                    </div>
                }
            </div>
        </p-accordion-content>
    </p-accordion-panel>
</p-accordion>
