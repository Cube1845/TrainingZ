<div class="flex w-full h-full flex-column align-items-center justify-content-center gap-3" [formGroup]="data">
    <h1 class="line-height-1 m-0 p-0">Register</h1>

    <div class="flex flex-column w-full">
        <p class="m-0 p-0 pl-1 line-height-1 mb-3">Data</p>
        <app-input label="Name" formControlName="name" class="mb-2" />
        <app-input label="Surname" formControlName="surname" />
    </div>

    <div class="flex flex-column w-full">
        <p class="m-0 p-0 pl-1 line-height-1 mb-3">Contact</p>
        <app-input label="Email" formControlName="email" class="mb-2" />
        <app-input label="Phone number (optional)" formControlName="phoneNumber" />
    </div>

    <div class="flex flex-column w-full">
        <p class="m-0 p-0 pl-1 line-height-1 mb-3">Password</p>
        <app-input label="Password" type="password" formControlName="password" class="mb-2"/>
        <app-input label="Confirm password" type="password" formControlName="confirmPassword" />
    </div>

    <div class="flex w-full mt-1">
        <h2 class="m-0 p-0 line-height-1 text-lg pr-3 pb-1">Coach account</h2>
        <p-toggle-switch formControlName="coachAccount"/>
    </div>

    <app-button label="Register" [outlined]="true" [disabled]="data.invalid" (click)="register()" />

    <a routerLink="login">Already have an account? Log in</a>
</div>
