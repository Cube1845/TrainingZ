<div class="flex w-full h-full flex-column align-items-center justify-content-center gap-3" [formGroup]="data">
    <h1 class="line-height-1 m-0 p-0">Register</h1>

    <app-input label="Email" formControlName="email" />
    <app-input label="Password" type="password" formControlName="password" />
    <app-input label="Confirm password" type="password" formControlName="confirmPassword" />

    <app-button label="Register" [outlined]="true" [disabled]="data.invalid" />

    <a routerLink="login">Already have an account? Log in</a>
</div>
