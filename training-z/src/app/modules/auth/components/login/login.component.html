<div class="flex w-full h-full flex-column align-items-center justify-content-center gap-3" [formGroup]="data">
    <h1 class="m-0 p-0 pb-5 text-3xl">Login</h1>

    <app-input label="Email" formControlName="email" />
    <app-input label="Password" type="password" formControlName="password" />

    <app-button label="Log in" [outlined]="true" [disabled]="data.invalid" (click)="login()" />

    <a routerLink="register">Don't have an account? Register</a>
</div>
